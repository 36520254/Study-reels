<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyReels</title>
    <style>
        /* 画面全体の基本設定 */
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
 
        /* スマホの縦長画面の枠枠（リール風） */
        .phone-screen {
            width: 100vw;
            max-width: 400px;
            height: 100vh;
            background-color: #1e1e1e;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
 
        /* 上部のヘッダー（おすすめ・フォロー中など） */
        .header {
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            border-bottom: 1px solid #333;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
 
        /* メインの動画表示エリア（今回は仮の場所） */
        .video-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: #888;
        }
 
        /* 下部のナビゲーションバー（ホームや検索ボタンの場所） */
        .nav-bar {
            height: 60px;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #000;
        }
 
        .nav-item {
            font-size: 12px;
            color: #aaa;
            cursor: pointer;
        }
        .nav-item.active {
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>
 
    <div class="phone-screen">
        <div class="header">おすすめ</div>
 
        <div class="video-area">
            🎬 ここに動画が流れるよ
        </div>
 
        <div class="nav-bar">
            <div class="nav-item active">ホーム</div>
            <div class="nav-item">検索</div>
            <div class="nav-item">＋</div>
            <div class="nav-item">プロフィール</div>
        </div>
    </div>
 
</body>
</html>
